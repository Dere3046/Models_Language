name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build interpreter
        run: |
          cmake -S interpreter -B /tmp/msla-build
          cmake --build /tmp/msla-build -j$(nproc)

      - name: Verify build
        run: |
          file /tmp/msla-build/msla_interpreter
          echo "Build OK"

      - name: Run CWE-78 test suite (all vectors)
        env:
          INTERPRETER: /tmp/msla-build/msla_interpreter
        run: bash .github/poc/run_all.sh
